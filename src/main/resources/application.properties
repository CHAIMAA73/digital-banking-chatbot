server.port=8082

# =====================
# OPENAI CONFIG
# =====================
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-3.5-turbo
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=1000

langchain4j.open-ai.embedding-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.embedding-model.model-name=text-embedding-3-small

# =====================
# TELEGRAM CONFIG
# =====================
telegram.bot.username=DigitalBankingBot
telegram.bot.token=TELEGRAM_TOKEN

# =====================
# BACKEND API URL
# =====================
banking.api.url=http://localhost:8080
banking.api.token=Bearer_JWT_TOKEN_ADMIN